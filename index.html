<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WESAM-ELITE</title>
<style>
:root{--bg:#050505;--gold:#d4af37;--text:#fff;--line:rgba(212,175,55,.2)}
*{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:10px}
.top{display:flex;justify-content:space-between;border:1px solid var(--line);padding:15px;border-radius:15px;background:#0a0a0a}
.btn{background:var(--gold);color:#000;border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:700;width:100%;margin-top:10px}
.term{background:#000;padding:10px;border-radius:10px;border:1px solid var(--gold);margin-top:15px}
#scr{height:100px;overflow:auto;color:#0f0;font-size:12px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="top"><b>♛ WESAM-ELITE</b><div>XP: <span id="xp">0</span></div></div>
<button class="btn" onclick="done()">إكمال المهمة (اختبار الـ XP)</button>
<div class="term"><div id="scr">[System Ready]</div></div>
<script>
let x=localStorage.getItem('xp')||0;document.getElementById('xp').innerText=x;
function done(){x=parseInt(x)+10;localStorage.setItem('xp',x);document.getElementById('xp').innerText=x;alert('عاش يا بطل! زاد الـ XP')}
</script>
</body>
</html>
