<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WESAM-ELITE | Sovereign Logic v2.5</title>
    <style>
        :root{--bg:#050505;--gold:#d4af37;--text:#fff;--glow:0 0 15px rgba(212,175,55,0.3)}
        body{background:var(--bg);color:var(--text);font-family:monospace;padding:20px;display:flex;justify-content:center;}
        .panel{width:100%;max-width:600px;border:1px solid var(--gold);padding:20px;background:#0a0a0a;box-shadow:var(--glow);}
        .display{height:450px;overflow-y:auto;margin-bottom:15px;padding:10px;border:1px solid #222;color:#0f0;}
        input{width:100%;padding:10px;background:#111;border:1px solid var(--gold);color:#fff;outline:none;}
    </style>
</head>
<body>

<div class="panel">
    <div class="display" id="log">
        [System]: WESAM-ELITE Sovereign Logic v2.5 Online...
    </div>
    <input type="text" id="cmd" placeholder="اسأل عن أي لغة برمجة..." onkeydown="if(event.key==='Enter')process()">
</div>

<script>
const LanguageDatabase = {
    "c#": "لغة النظام. هي القلب النابض لـ Unity. سيف الجنرال المفضل لبناء عوالم 3D دقيقة.",
    "c++": "اللغة الثقيلة. سلاح التدمير الشامل (Unreal Engine). تتطلب تحكماً كاملاً بالذاكرة، ولا يتقنها إلا المحترفون.",
    "gdscript": "خنجر المناورة. سريعة، رشيقة، ومثالية للنماذج الأولية في Godot. هي لغة المباغتة البرمجية.",
    "python": "لغة الدبلوماسية والذكاء الاصطناعي. سهلة، قوية في البيانات، لكنها بطيئة مقارنة بالوحوش الأخرى.",
    "javascript": "لغة الويب والسيطرة على المتصفحات. هي جسرنا الحالي، ومن خلالها نتحكم في واجهة WESAM-ELITE.",
    "java": "لغة الشركات والمؤسسات. معقدة، صلبة، وتدير كبرى البنى التحتية العالمية.",
    "html": "لغة الهيكل. لا حياة لأي نظام رقمي بدونها.",
    "css": "لغة الجمال. هي التي تمنح النظام أناقته وهيبته."
};

function process() {
    const input = document.getElementById('cmd');
    const log = document.getElementById('log');
    let val = input.value.trim().toLowerCase();
    
    if(!val) return;

    log.innerHTML += `<div style="color:var(--gold)">> [Command]: ${val}</div>`;
    
    let reply = `[WESAM-ELITE]: `;
    let found = false;

    // البحث في قاعدة البيانات
    for(let lang in LanguageDatabase) {
        if(val.includes(lang)) {
            reply += `تحليل لغة ${lang.toUpperCase()}: ${LanguageDatabase[lang]}. هذه اللغة في ترسانتنا البرمجية تعتبر ${val.includes('افضل') ? 'الأقوى إذا استخدمت في سياقها الصحيح' : 'أداة حيوية لتعزيز قوة النظام'}.`;
            found = true;
            break;
        }
    }

    if(!found) {
        reply += `تحليل مجهول: الموضوع "${val}" غير موجود في قاموس اللغات التقليدي. هل تريد مني اختراع "لغة سيادية" جديدة لـ WESAM-ELITE؟`;
    }

    log.innerHTML += `<div style="margin-top:10px;">${reply}</div>`;
    log.scrollTop = log.scrollHeight;
    input.value = '';
}
</script>
</body>
</html>
