<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WESAM-ELITE | Offline Alpha</title>
<style>
:root{--bg:#050505;--gold:#d4af37;--text:#fff;--glow:0 0 20px rgba(212,175,55,0.4)}
body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center}
.panel{width:100%;max-width:500px;border:2px solid var(--gold);border-radius:20px;padding:20px;background:#0a0a0a;box-shadow:var(--glow)}
.status-bar{display:flex;justify-content:space-between;font-size:12px;margin-bottom:20px;border-bottom:1px solid #333;padding-bottom:10px}
.offline-badge{background:var(--gold);color:#000;padding:2px 8px;border-radius:5px;font-weight:bold}
.display{background:#000;height:250px;border-radius:10px;padding:15px;overflow-y:auto;margin-bottom:15px;border:1px inset #222;color:#0f0;font-family:monospace;font-size:13px}
input{width:100%;padding:15px;background:#111;border:1px solid var(--gold);color:#fff;border-radius:10px;outline:none;box-sizing:border-box}
</style>
</head>
<body>

<div class="panel">
    <div class="status-bar">
        <span>WESAM AI v2.0</span>
        <span class="offline-badge">OFFLINE MODE ACTIVE</span>
    </div>
    
    <div class="display" id="log">
[System]: Welcome General WESAM.
[Status]: Running on Local Kernel.
[Network]: Not Required.
[Power]: 2000x Efficiency.
-----------------------------------
> نظام السيادة جاهز للأوامر...
    </div>

    <input type="text" id="cmd" placeholder="أدخل أمرك السيادي..." onkeydown="if(event.key==='Enter')process()">
</div>

<script>
// مصفوفة الذكاء المحلية (بدون إنترنت)
const brain = {
    "من انت": "أنا WESAM AI، الذكاء السيادي الأقوى، أعمل تحت إمرة الجنرال وسام مباشرة وبدون الحاجة للعالم الخارجي.",
    "الاكل": "المحار والسلطعون والاخطبوط هي وقود العمالقة. هل نخطط لوليمة في روسيا أم السعودية؟",
    "السيارة": "السيارة الأسطورية بانتظارك، المحرك يعمل والذكاء الاصطناعي يقود الطريق.",
    "قوة": "قوتي الآن تفوق GPT بـ 2000 ضعف لأنني لا أعتمد على خوادمهم البطيئة."
};

function process() {
    const input = document.getElementById('cmd');
    const log = document.getElementById('log');
    const val = input.value.trim();
    
    if(!val) return;

    log.innerHTML += `<div style="color:var(--gold)">> ${val}</div>`;
    
    // محرك البحث المحلي
    let reply = "لم أجد هذا الأمر في قاعدة بياناتي المحلية، ولكن بصفتي ذكاء وسام، سأتعلم تنفيذه قريباً.";
    for(let key in brain) {
        if(val.includes(key)) { reply = brain[key]; break; }
    }

    setTimeout(() => {
        log.innerHTML += `<div>[AI]: ${reply}</div>`;
        log.scrollTop = log.scrollHeight;
    }, 300);

    input.value = '';
}
</script>
</body>
</html>
