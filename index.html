<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | نظام السيادة الرقمي</title>
    <style>
        /* تصميم الفخامة (الأسود والذهبي) */
        body {
            background-color: #050505;
            color: #d4af37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-frame {
            border: 3px solid #d4af37;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            background: rgba(10, 10, 10, 0.9);
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #ffffff;
            font-size: 1.2em;
            margin-bottom: 30px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }

        .system-status {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: #00ff00;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #d4af37;
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="system-status">[ STATUS: SECURE ] [ POWER: STABLE ]</div>
        <h1>WESAM-ELITE</h1>
        <div class="subtitle">الأكاديمية السيادية - نسخة الجنرال</div>
        
        <p>مرحباً بك يا جنرال وسام في مركز القيادة.</p>
        <p>نظام تعلم اللغات والبرمجة جاهز بانتظار أوامرك التنفيذية.</p>

        <a href="#" class="btn">دخول نظام السيادة</a>

        <div class="footer-note">
            جميع الحقوق محفوظة للجنرال وسام | 2026<br>
            Supported by Exodus Crypto Payments
        </div>
    </div>

</body>
  </html>
