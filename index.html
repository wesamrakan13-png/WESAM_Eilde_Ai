<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><title>WESAM-ELITE | Royal Academy</title>
  <style>
    :root{--gold:#d4af37;--bg:#050505;--card:#0b0b0b;--line:rgba(212,175,55,.2);--text:#fff}
    body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:20px}
    .top{display:flex;justify-content:space-between;border:1px solid var(--line);padding:15px;border-radius:15px;margin-bottom:20px}
    .stat{text-align:center;min-width:80px}.stat b{color:var(--gold);display:block}
    .grid{display:grid;grid-template-columns:300px 1fr 350px;gap:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:20px}
    .btn{background:var(--gold);border:none;padding:10px;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;margin:5px 0}
    .btn-s{background:#111;color:#fff;border:1px solid var(--line)}
    .path-btn{background:#000;color:#fff;border:1px solid var(--line);width:100%;padding:15px;margin-bottom:10px;cursor:pointer;text-align:right}
    .active{border-color:var(--gold);box-shadow:0 0 10px var(--line)}
    .level{border-bottom:1px solid var(--line);padding:15px 0}.done{opacity:0.6;border-color:#27d17f}
    #screen{background:#000;border:1px solid var(--line);height:200px;overflow:auto;padding:10px;font-family:monospace;white-space:pre-wrap}
    textarea,input{width:100%;background:#090909;color:#fff;border:1px solid var(--line);padding:10px;margin-top:10px;outline:none}
    @media(max-width:1000px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top">
    <div><h2 style="margin:0;color:var(--gold)">♛ WESAM-ELITE</h2><small>Royal Academy</small></div>
    <div style="display:flex;gap:15px">
      <div class="stat"><span>XP</span><b id="xp">0</b></div>
      <div class="stat"><span>LVL</span><b id="lvl">1</b></div>
    </div>
  </div>

  <div class="grid">
    <aside class="card">
      <h3>Paths</h3>
      <button class="path-btn active" onclick="setPath('languages')">Human Languages</button>
      <button class="path-btn" onclick="setPath('technical')">Technical Skills</button>
    </aside>

    <main class="card">
      <h3>Roadmap</h3><div id="roadmap"></div>
    </main>

    <aside class="card">
      <h3>Sandbox</h3>
      <div id="screen">[Wesam Terminal Ready]</div>
      <input id="cmd" placeholder="Command (help, echo, clear)..." onkeypress="if(event.key==='Enter')runCmd()">
      <textarea id="box" placeholder="Unlimited notes..." rows="5"></textarea>
      <button class="btn" onclick="saveNote()">Save Note</button>
      <button class="btn-s btn" onclick="loadNote()">Load Note</button>
    </aside>
  </div>

  <script>
    const KEY = 'wesam_pro';
    let st = JSON.parse(localStorage.getItem(KEY)) || {p:'languages',xp:0,done:{languages:[],technical:[]},n:''};
    const cur = {
      languages: [{id:'l1',t:'Basics',x:50},{id:'l2',t:'Grammar',x:100}],
      technical: [{id:'t1',t:'Web Dev',x:60},{id:'t2',t:'Cyber Security',x:120}]
    };

    const save=()=>localStorage.setItem(KEY, JSON.stringify(st));
    const render=()=>{
      document.getElementById('xp').textContent=st.xp;
      document.getElementById('lvl').textContent=1+Math.floor(st.xp/100);
      const rd=document.getElementById('roadmap'); rd.innerHTML='';
      cur[st.p].forEach(l=>{
        const isD=st.done[st.p].includes(l.id);
        rd.innerHTML+=`<div class="level ${isD?'done':''}"><h4>${l.t} (${l.x} XP)</h4>
          <button class="btn" onclick="finish('${l.id}',${l.x})" ${isD?'disabled':''}>${isD?'Completed':'Mark Done'}</button></div>`;
      });
    };

    window.finish=(id,x)=>{ if(!st.done[st.p].includes(id)){st.done[st.p].push(id);st.xp+=x;save();render();} };
    window.setPath=(p)=>{ st.p=p; document.querySelectorAll('.path-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(p.slice(0,3)))); render(); save(); };
    window.runCmd=()=>{
      const i=document.getElementById('cmd'), s=document.getElementById('screen');
      if(i.value==='help') s.textContent+='\n- help, echo, clear';
      else if(i.value==='clear') s.textContent='[Cleared]';
      else s.textContent+=`\n> ${i.value}`;
      i.value=''; s.scrollTop=s.scrollHeight;
    };
    window.saveNote=()=>{ st.n=document.getElementById('box').value; save(); alert('Saved!'); };
    window.loadNote=()=>{ document.getElementById('box').value=st.n; };

    render();
  </script>
</body>
</html>
