<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WESAM-ELITE | Royal Academy</title>
<style>
:root{--bg:#050505;--gold:#d4af37;--text:#fff;--line:rgba(212,175,55,.2);--radius:15px}
*{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:15px}
.top{display:flex;justify-content:space-between;border:1px solid var(--line);padding:15px;border-radius:var(--radius);margin-bottom:15px;background:#0a0a0a}
.card{background:#0d0d0d;border:1px solid var(--line);padding:15px;border-radius:var(--radius);margin-bottom:15px}
.btn{background:var(--gold);color:#000;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;font-weight:700;margin:5px}
.btn.sec{background:#1a1a1a;color:#fff;border:1px solid var(--line)}
.btn:disabled{opacity:.3}.bar{height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;margin:10px 0}
#prog{height:100%;width:0;background:var(--gold);transition:.3s}.grid{display:grid;grid-template-columns:1fr 2fr 1.5fr;gap:15px}
.lvl{border:1px solid var(--line);padding:10px;margin-bottom:10px;border-radius:10px}.locked{opacity:.4}
.term{background:#000;padding:10px;border-radius:10px;min-height:200px;font-family:monospace;border:1px solid var(--gold)}
#scr{height:150px;overflow:auto;color:#0f0;font-size:12px;margin-bottom:10px;white-space:pre-wrap}
input{width:100%;background:#111;border:1px solid var(--line);color:#fff;padding:8px;border-radius:5px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
<div><b>♛ WESAM-ELITE</b><p style="font-size:10px;color:gray">Royal Academy Edition</p></div>
<div>XP: <span id="xp">0</span> | Streak: <span id="stk">0</span> | Lvl: <span id="glvl">1</span></div>
</div>
<div class="card">
<div class="bar"><div id="prog"></div></div>
<button class="btn sec" onclick="setPath('languages')">Human Languages</button>
<button class="btn sec" onclick="setPath('technical')">Technical Skills</button>
</div>
<div class="grid">
<div class="card"><h3>Paths</h3><p id="cpath">Languages</p></div>
<div class="card" id="roadmap"></div>
<div class="card">
<h3>Sandbox</h3>
<div class="term"><div id="scr">[System Ready]</div><input id="cin" placeholder="Type help..." onkeydown="if(event.key==='Enter')runCmd()"></div>
</div>
</div>
<script>
const S='wesam_v2',cur={languages:[{id:'l1',t:'Foundation',x:50},{id:'l2',t:'Grammar',x:70},{id:'l3',t:'Speaking',x:100}],technical:[{id:'t1',t:'Programming',x:60},{id:'t2',t:'Cyber Basics',x:90},{id:'t3',t:'Sandbox Labs',x:120}]};
let st={p:'languages',x:0,s:0,d:null,c:{languages:[],technical:[]}};
function save(){localStorage.setItem(S,JSON.stringify(st))}
function load(){const r=localStorage.getItem(S);if(r)st=JSON.parse(r)}
function render(){
document.getElementById('xp').innerText=st.x;document.getElementById('stk').innerText=st.s;document.getElementById('glvl').innerText=1+Math.floor(st.x/100);
document.getElementById('cpath').innerText=st.p==='languages'?'Languages':'Technical';
const r=document.getElementById('roadmap');r.innerHTML='';
cur[st.p].forEach((l,i)=>{
const unk=i===0||st.c[st.p].includes(cur[st.p][i-1].id),don=st.c[st.p].includes(l.id);
r.innerHTML+=`<div class="lvl ${!unk&&!don?'locked':''}"><b>${l.t}</b><br><button class="btn" onclick="done('${l.id}')" ${!unk||don?'disabled':''}>${don?'✓':'Complete'}</button></div>`;
});
const pct=(st.c.languages.length+st.c.technical.length)/6*100;document.getElementById('prog').style.width=pct+'%';
}
function setPath(p){st.p=p;render();save()}
function done(id){const l=cur[st.p].find(x=>x.id===id);st.c[st.p].push(id);st.x+=l.x;render();save()}
function runCmd(){
const i=document.getElementById('cin'),v=i.value.trim().toLowerCase(),s=document.getElementById('scr');
let o='';if(v==='help')o='Commands: scan, help, clear';else if(v==='scan')o='[OK] No threats.';else if(v==='clear'){s.innerText='';i.value='';return;}else o='Unknown command.';
s.innerText+='\n> '+v+'\n'+o;s.scrollTop=s.scrollHeight;i.value='';
}
load();render();
</script>
</body>
  </html>
