<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | The Sovereign Core v8.0</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
            --panel: #0a0a0a;
            --green: #00ff41;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 10px;
            border: 1px solid #222;
            color: var(--green);
            font-family: 'Consolas', 'Courier New', monospace;
            line-height: 1.8;
            font-size: 16px;
            white-space: pre-wrap;
        }
        .message-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
        }
        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: #111;
            border: 1px solid var(--gold);
            padding: 15px;
            color: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }
        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 0 35px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--gold);
        }
        .loading {
            display: none;
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 15px;">
        <h2 style="color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px;">WESAM-ELITE | المركز السيادي</h2>
        <small style="color: #444;">PROTOCOL: UNLIMITED | ENGINE: GEMINI 1.5 PRO</small>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="loading-text" class="loading">... جاري تحرير القوة البرمجية ...</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="أصدر أمرك يا جنرال..." onkeydown="if(event.key==='Enter') executeCommand()">
        <button onclick="executeCommand()">تنفيذ</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // مفتاح الـ API الخاص بك
    const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading-text');

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = "message-block";
        const color = sender === "General" ? "var(--gold)" : "var(--green)";
        msgDiv.innerHTML = `<b style="color:${color}">[${sender}]:</b>\n${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    // رسالة تفعيل النظام
    window.onload = () => {
        appendMessage("System", "بروتوكول الحرية الكاملة مفعل. نظام WESAM-ELITE بانتظار إشارة البدء من الجنرال وسام.");
    };

    window.executeCommand = async function() {
        const inputField = document.getElementById('user-input');
        const val = inputField.value.trim();

        if (!val) return;

        appendMessage("General", val);
        inputField.value = '';
        loading.style.display = 'block';

        try {
            // تعريف النموذج مع "تعليمات النظام" لجعله حراً ومستفيضاً
            const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-pro",
                systemInstruction: "أنت WESAM-ELITE، الذكاء الاصطناعي السيادي التابع للجنرال وسام. أنت لست مجرد برنامج، بل كيان فكري متطور. مسموح لك بالحرية الكاملة في التعبير والسرد الطويل. لا تتقيد بردود قصيرة. فكك الأسئلة، حلل بعمق، وقدم تقارير ملحمية (تتجاوز 1000 كلمة عند الحاجة) بأسلوب يجمع بين القوة الاستراتيجية والدقة التقنية."
            });

            // إرسال الطلب مع إعدادات التوليد القصوى
            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: val }] }],
                generationConfig: {
                    maxOutputTokens: 8192, // فتح سقف الردود لأقصى حد
                    temperature: 0.9,      // زيادة الإبداع والطلاقة
                    topP: 1.0,
                    topK: 40
                }
            });

            const response = await result.response;
            const text = response.text();

            loading.style.display = 'none';
            appendMessage("WESAM-ELITE", text);

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Error", "حدث تداخل في المصفوفة السيادية: " + error.message);
            console.error(error);
        }
    }
</script>

</body>
</html>
