<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WESAM-ELITE | Sovereign Core</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .container { width: 95%; max-width: 900px; height: 90vh; border: 2px solid var(--gold); display: flex; flex-direction: column; padding: 20px; border-radius: 15px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .message-block { margin-bottom: 20px; line-height: 1.6; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid var(--gold); color: #fff; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="chat-box"></div>
    <div id="loading-text" style="display:none; color:var(--gold);">... جاري المعالجة السيادية ...</div>
    <input type="text" id="user-input" placeholder="أدخل أمرك الاستراتيجي..." onkeydown="if(event.key==='Enter') executeCommand()">
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const genAI = new GoogleGenerativeAI("AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0");
    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading-text');

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = "message-block";
        div.innerHTML = `<b style="color:${sender==='General'?'var(--gold)':'var(--green)'}">[${sender}]:</b><br>${text.replace(/\n/g, '<br>')}`;
        chatBox.appendChild(div);
        chatBox.scrollTo(0, chatBox.scrollHeight);
    }

    window.executeCommand = async function() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;

        appendMessage("General", val);
        input.value = '';
        loading.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });
            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: "أنت WESAM-ELITE، المستشار الاستراتيجي. أجب على هذا الأمر بتقرير مفصل وشامل (لا يقل عن 1000 كلمة): " + val }] }],
                generationConfig: { maxOutputTokens: 8192, temperature: 1.0 }
            });

            loading.style.display = 'none';
            appendMessage("WESAM-ELITE", (await result.response).text());
        } catch (e) {
            loading.style.display = 'none';
            appendMessage("System", "فشل الاستدعاء: " + e.message);
        }
    };
</script>
</body>
</html>
