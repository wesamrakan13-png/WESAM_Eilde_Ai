<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM ELITE AI - Strategic Console</title>
    <style>
        :root { --primary: #d4af37; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #console { width: 90%; max-width: 700px; height: 85vh; background: var(--panel); border: 1px solid #333; display: flex; flex-direction: column; border-top: 4px solid var(--primary); border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #header { padding: 15px; text-align: center; color: var(--primary); font-weight: bold; border-bottom: 1px solid #222; letter-spacing: 1px; }
        #display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; font-size: 1.05rem; }
        .user-msg { align-self: flex-start; background: #222; border-right: 4px solid var(--primary); }
        .ai-msg { align-self: flex-end; background: #000; color: var(--primary); border-left: 4px solid var(--primary); box-shadow: inset 0 0 10px rgba(212,175,55,0.05); }
        #input-zone { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; background: #0a0a0a; border-radius: 0 0 12px 12px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: #000; border: none; padding: 0 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="console">
    <div id="header">WESAM ELITE AI [v1.0.5]</div>
    <div id="display"></div>
    <div id="input-zone">
        <input type="text" id="userInput" placeholder="أدخل أوامرك يا وسام..." onkeypress="if(event.key==='Enter') execute()">
        <button onclick="execute()">EXECUTE</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    async function execute() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        // إضافة رسالة المستخدم
        addMsg(text, 'user-msg');
        input.value = "";

        // جلب رد الذكاء الاصطناعي
        const response = getEliteResponse(text);
        
        // إنشاء حاوية رد الـ AI فارغة
        const aiBox = addMsg("", 'ai-msg');
        
        // تشغيل محرك الكتابة (المحرك المستقر)
        await typewriter(aiBox, response);
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
        return div;
    }

    function getEliteResponse(input) {
        const cmd = input.toLowerCase();
        
        if (cmd.includes("استراتيجية") || cmd.includes("شرح") || cmd.includes("مشروع")) {
            return "تعتمد الاستراتيجية على معمارية Decoupled Systems لضمان الكفاءة القتالية للمشروع.\n\n" +
                   "المعمارية التقنية: استخدام أنظمة مستقلة لكل جزء من الكود (Audio, AI, Physics) لضمان عدم حدوث تداخل.\n\n" +
                   "نظام الـ Rendering الخاص بي الآن يدعم كامل النصوص دون أي احتراق أو نقص.\n\n" +
                   "أنا جاهز للتنفيذ يا وسام.";
        }
        
        return "تم استقبال الأمر. جاري تحليل البيانات في قاعدة بيانات WESAM ELITE AI...";
    }

    async function typewriter(element, text) {
        // تنظيف العنصر قبل البدء لضمان عدم التكرار
        element.textContent = ""; 
        const words = text.split(" ");
        
        for (let word of words) {
            element.textContent += word + " ";
            display.scrollTop = display.scrollHeight;
            // انتظار بسيط لضمان سلاسة العرض ومنع الـ Rendering Lag
            await new Promise(r => setTimeout(r, 45));
        }
    }
</script>

</body>
</html>
