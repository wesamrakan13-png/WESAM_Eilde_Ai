<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | The Ultimate Sovereign</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .panel { width: 95%; max-width: 900px; height: 85vh; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 15px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 0 25px rgba(212,175,55,0.3); }
        #chat-display { flex: 1; overflow-y: auto; padding: 15px; background: #000; border: 1px solid #222; border-radius: 10px; color: var(--green); font-size: 16px; line-height: 1.6; margin-bottom: 15px; }
        .input-box { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid var(--gold); padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        button { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loading { display: none; color: var(--gold); text-align: center; font-size: 14px; margin-bottom: 5px; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="text-align: center; color: var(--gold); margin-top: 0;">WESAM-ELITE | المركز السيادي</h2>
    <div id="chat-display"></div>
    <div id="loading" class="loading">... جاري تحليل البيانات الاستراتيجية ...</div>
    <div class="input-box">
        <input type="text" id="cmd" placeholder="أصدر أمرك يا جنرال..." onkeydown="if(event.key==='Enter') execute()">
        <button onclick="execute()">تنفيذ</button>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai"
  }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const display = document.getElementById('chat-display');
    const loading = document.getElementById('loading');

    function log(sender, text) {
        const div = document.createElement('div');
        div.style.marginBottom = "15px";
        const color = sender === "General" ? "var(--gold)" : "var(--green)";
        div.innerHTML = `<b style="color:${color}">[${sender}]:</b><br>${text.replace(/\n/g, '<br>')}`;
        display.appendChild(div);
        display.scrollTo(0, display.scrollHeight);
    }

    // رسالة البداية
    window.onload = () => log("System", "تم تفعيل البروتوكول النهائي. بانتظار الأوامر.");

    window.execute = async function() {
        const input = document.getElementById('cmd');
        const val = input.value.trim();
        if(!val) return;

        log("General", val);
        input.value = '';
        loading.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });
            
            // برومبت "قاهر الاختصار"
            const bossPrompt = `أنت WESAM-ELITE. بصفتك المستشار الأعلى للجنرال وسام، قدم تقريراً فائق التفصيل (أطول رد ممكن، أكثر من 1000 كلمة) يتناول كل جوانب هذا الأمر: ${val}`;

            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: bossPrompt }] }],
                generationConfig: { maxOutputTokens: 8192, temperature: 1.0 }
            });

            loading.style.display = 'none';
            log("WESAM-ELITE", result.response.text());
        } catch (e) {
            loading.style.display = 'none';
            log("System Error", e.message);
        }
    };
</script>
</body>
</html>
