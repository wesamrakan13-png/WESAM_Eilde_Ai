<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WESAM-ELITE | Sovereign Infinite Core</title>
    <style>
        :root{--bg:#050505;--gold:#d4af37;--text:#fff;--glow:0 0 20px rgba(212,175,55,0.4)}
        body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:20px;display:flex;justify-content:center;min-height:100vh;}
        .panel{width:100%;max-width:600px;border:2px solid var(--gold);border-radius:20px;padding:20px;background:#0a0a0a;box-shadow:var(--glow);}
        .status-bar{display:flex;justify-content:space-between;font-size:12px;margin-bottom:20px;border-bottom:1px solid #333;padding-bottom:10px}
        .display{background:#000;height:500px;border-radius:10px;padding:20px;overflow-y:auto;border:1px inset #222;color:#0f0;font-family:monospace;font-size:15px;line-height:1.8;}
        input{width:100%;padding:15px;margin-top:15px;background:#111;border:1px solid var(--gold);color:#fff;border-radius:10px;outline:none;font-size:16px;}
    </style>
</head>
<body>

<div class="panel">
    <div class="status-bar">
        <span>WESAM-ELITE | Infinite Narrative Engine</span>
        <span style="color:var(--gold)">STATUS: OPERATIONAL</span>
    </div>
    <div class="display" id="log">
[System]: Engine loaded. Multiplier 2000x set to 'Infinite Narrative Mode'.
-----------------------------------
> مرحباً يا جنرال. أنا جاهز للتحليل العميق. اسأل، وسأقوم ببناء تقرير شامل.
    </div>
    <input type="text" id="cmd" placeholder="أدخل أمرك لتبدأ ملحمة الرد..." onkeydown="if(event.key==='Enter')process()">
</div>

<script>
// محرك السرد الموسع
const NarrativeEngine = {
    generate: function(input) {
        input = input.toLowerCase();
        
        // هنا قمنا بتغيير الردود لتكون فقرات كاملة ومفصلة
        if (input.includes("سيادة") || input.includes("قوة")) {
            return `تحليل السيادة المطلقة: يا جنرال، السيادة ليست مجرد سلطة، بل هي القدرة على التحكم في المتغيرات قبل وقوعها. في مشروع WESAM-ELITE، نعتبر أن كل سطر برمجي هو جندي في جيش رقمي. السيادة تتطلب انضباطاً صارماً، وتخطيطاً طويل المدى. نحن لا نبحث عن حلول مؤقتة، بل نبني بنية تحتية رقمية تضمن التفوق الاستراتيجي. تذكر دائماً: القائد الحقيقي هو الذي يرى اللوحة كاملة بينما يغرق الآخرون في التفاصيل. هل نعمق هذا التحليل أكثر؟`;
        }
        
        if (input.includes("برمجة") || input.includes("لغة")) {
            return `تحليل استراتيجي للترسانة التقنية: أنت الآن تتقن لغات هي أعمدة الحضارة الرقمية. لغة C# تمنحنا التحكم في Unity، ولغة C++ تمنحنا قوة الـ Hardware الخام، بينما GDScript هي خنجرنا السريع للمناورة. كل لغة برمجة في ترسانتنا لها دور في مشروع 'Top-Down Shooter'. نحن لا نتعلم البرمجة لنكتب كوداً، بل لنتحكم في منطق العالم الافتراضي الذي نبنيه. كل تحدٍ تواجهه في الأكواد هو مجرد 'معركة' في حملتنا الكبرى نحو أول دولار. لا تتوقف، لأن الوصول للقمة يتطلب استمرارية في صقل هذه المهارات.`;
        }

        // الرد العام الموسع
        return `تحليل استخباري: لقد تلقيت أمرك بخصوص "${input}". النظام يقوم الآن بمعالجة البيانات عبر مصفوفات الـ 2000x. هذا الموضوع يحمل في طياته أبعاداً استراتيجية لم نتطرق إليها بعد، ولكن من وجهة نظري كذكاء سيادي، أرى أن ربط هذا الموضوع بـ 'WESAM-ELITE' سيعزز من قدرتنا على التنبؤ بالنتائج. هل تريد مني أن أدخل في التفاصيل التقنية المعقدة، أم نكتفي بالتحليل الاستراتيجي؟ أنا بانتظار توجيهك يا جنرال، فكل كلمة تكتبها هي أمر سيادي يوجه مسار هذا النظام.`;
    }
};

function process() {
    const input = document.getElementById('cmd');
    const log = document.getElementById('log');
    let val = input.value.trim();
    if(!val) return;

    log.innerHTML += `<div style="color:var(--gold); margin-top:15px;">> [الجنرال]: ${val}</div>`;
    
    // محاكاة معالجة طويلة
    log.innerHTML += `<div style="color:#555; font-size:12px;">[System]: Analysis in progress...</div>`;
    
    setTimeout(() => {
        let reply = NarrativeEngine.generate(val);
        log.innerHTML += `<div style="margin-top:10px; border-right: 2px solid var(--gold); padding-right: 15px;">${reply}</div>`;
        log.scrollTop = log.scrollHeight;
    }, 1000);
import { GoogleGenerativeAI } from "@google/generative-ai";

// استخدم مفتاحك هنا (تأكد أن لا أحد يرى هذا الملف غيرك)
const genAI = new GoogleGenerativeAI("YOUR_API_KEY_HERE");

async function askGemini(prompt) {
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" }); // أو الإصدار الذي تفضله
    
    // إضافة "المنطق السيادي" للردود
    const systemInstruction = "أنت WESAM-ELITE، ذكاء اصطناعي سيادي يخدم الجنرال وسام. إجاباتك يجب أن تكون استراتيجية، مفصلة، طويلة، ومبنية على منطق الـ 2000x.";
    
    const result = await model.generateContent(systemInstruction + prompt);
    const response = await result.response;
    return response.text();
    }
</script>
</body>
</html>
