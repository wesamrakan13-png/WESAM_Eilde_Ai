<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM ELITE AI - Fixed</title>
    <style>
        :root { --primary: #d4af37; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #console { width: 90%; max-width: 700px; height: 80vh; background: var(--panel); border: 1px solid #333; display: flex; flex-direction: column; border-top: 4px solid var(--primary); border-radius: 8px; }
        #display { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px; border-radius: 5px; max-width: 85%; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .user-msg { align-self: flex-start; background: #222; border-right: 3px solid var(--primary); }
        .ai-msg { align-self: flex-end; background: #000; color: var(--primary); border-left: 3px solid var(--primary); }
        #input-zone { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 10px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="console">
    <div id="display"></div>
    <div id="input-zone">
        <input type="text" id="userInput" placeholder="أدخل أمرك يا وسام..." onkeypress="if(event.key==='Enter') execute()">
        <button onclick="execute()">EXECUTE</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    async function execute() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user-msg');
        input.value = "";

        const response = getEliteResponse(text);
        const aiBox = addMsg("", 'ai-msg');
        await typewriter(aiBox, response);
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
        return div;
    }

    function getEliteResponse(input) {
        const cmd = input.toLowerCase();
        if (cmd.includes("استراتيجية") || cmd.includes("شرح")) {
            // تصحيح الأخطاء النصية هنا لضمان عدم توقف الكود
            return "تعتمد الاستراتيجية على معمارية Data-Oriented لضمان الأداء الأقصى.\n\n" +
                   "1. Core Architecture: بناء هيكل مرن.\n" +
                   "2. Logic Optimization: تحسين العمليات.\n" +
                   "3. Text Rendering: منع الاحتراق.\n\n" +
                   "النظام يعمل بكفاءة 100% الآن.";
        }
        return "النظام مستعد لتنفيذ أوامرك.";
    }

    async function typewriter(element, text) {
        const words = text.split(" ");
        for (let word of words) {
            element.textContent += word + " ";
            display.scrollTop = display.scrollHeight;
            await new Promise(r => setTimeout(r, 50));
        }
    }
</script>
</body>
</html>
