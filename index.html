<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM AI</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; background: #2d2d2d; border-radius: 10px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00ffcc; border-bottom: 2px solid #00ffcc; padding-bottom: 10px; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; max-width: 80%; }
        .user { align-self: flex-end; background: #007bff; }
        .ai { align-self: flex-start; background: #444; color: #00ffcc; font-weight: bold; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { width: 15%; padding: 10px; background: #00ffcc; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>WESAM AI</h2>
    <div id="messages"></div>
    <div style="display: flex; justify-content: space-between;">
        <input type="text" id="userInput" placeholder="اسأل وسام...">
        <button onclick="askWesam()">إرسال</button>
    </div>
</div>

<script>
    function askWesam() {
        const input = document.getElementById("userInput");
        const msgDiv = document.getElementById("messages");
        
        if (input.value.trim() === "") return;

        // إضافة رسالة المستخدم
        msgDiv.innerHTML += `<div class="msg user">${input.value}</div>`;
        
        let response = "";
        const query = input.value.toLowerCase();

        // منطق "عقل" WESAM AI
        if (query.includes("من أنت")) {
            response = "أنا WESAM AI، الذكاء الاصطناعي الخاص بالمبرمج وسام، أنا هنا للسيطرة على الكود!";
        } else if (query.includes("مشروع") || query.includes("لعبة")) {
            response = "المشروع القادم سيكون أسطورياً، نحن الآن في مرحلة البرمجة المتقدمة.";
        } else if (query.includes("ذكاء")) {
            response = "ذكائي مستمد من عقلية وسام الاستراتيجية (92/100)!";
        } else {
            response = "هذا سؤال مثير.. وسام لم يبرمجني للرد على هذا بعد، لكنه سيفعل قريباً.";
        }

        // إضافة رد WESAM AI بعد تأخير بسيط ليظهر كأنه يفكر
        setTimeout(() => {
            msgDiv.innerHTML += `<div class="msg ai">WESAM AI: ${response}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }, 500);

        input.value = "";
    }
</script>

</body>
</html>
