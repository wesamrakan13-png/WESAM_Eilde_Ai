<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM ELITE AI - Console</title>
    <style>
        :root {
            --primary: #d4af37; /* لون ذهبي للنخبة */
            --bg: #050505;
            --box-bg: rgba(20, 20, 20, 0.9);
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #console-container {
            width: 90%;
            max-width: 700px;
            height: 85vh;
            background: var(--box-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            border-top: 4px solid var(--primary);
        }

        #header {
            padding: 15px;
            text-align: center;
            letter-spacing: 2px;
            color: var(--primary);
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            font-size: 1.2rem;
        }

        #display-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 90%;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.7;
            font-size: 1.05rem;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            white-space: pre-wrap; /* أهم كود لمنع ضياع الأسطر والكلمات */
        }

        .user-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
        }

        .ai-msg {
            align-self: flex-end;
            background: rgba(0, 0, 0, 0.6);
            color: var(--primary);
            border: 1px solid #444;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
        }

        #input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* تنسيق الـ Scrollbar لمنع التشوه البصري */
        #display-area::-webkit-scrollbar { width: 5px; }
        #display-area::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div id="console-container">
    <div id="header">WESAM ELITE AI [STRATEGIC CONSOLE]</div>
    <div id="display-area"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="أدخل الأوامر..." onkeypress="if(event.key==='Enter') process()">
        <button onclick="process()">EXECUTE</button>
    </div>
</div>

<script>
    const display = document.getElementById('display-area');

    async function process() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        // رسالة المستخدم
        createMessage(text, 'user-msg');
        input.value = "";

        // رد الـ AI مع نظام "مانع الاحتراق"
        const responseText = getResponse(text);
        const aiBox = createMessage("", 'ai-msg');
        await typeWriterEffect(aiBox, responseText);
    }

    function createMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
        return div;
    }

    function getResponse(input) {
        const cmd = input.toLowerCase();
        // هذا النص طويل عمداً لاختبار اكتمال الرد
        if (cmd.includes("استراتيجية") || cmd.includes("شرح")) {
            return "تعتمد الاستراتيجية على معمارية Data-Oriented لضمان الأداء الأقصى واستقرار النظام عبر المحاور التالية:\n\n" +
                   "1. Core Architecture: بناء هيكل كودي مرن.\n" + 2. Logic Optimization: تحسين العمليات المنطقية.\n" +
                   "3. Text Rendering: ضمان خروج كل حرف دون احتراق نصي.\n\n" +
                   "النظام الآن يعمل بكفاءة 100% يا وسام.";
        }
        return "جاري المعالجة... النظام في وضع الاستعداد لتنفيذ أوامر النخبة.";
    }

    // المحرك المطور: يكتب كلمة بكلمة لضمان الاستقرار الكلي
    async function typeWriterEffect(element, text) {
        const words = text.split(" ");
        element.textContent = ""; 
        
        for (const word of words) {
            element.textContent += word + " ";
            display.scrollTop = display.scrollHeight;
            // تأخير 40ms يضمن للمتصفح رسم الكلمة قبل الانتقال للتالية
            await new Promise(r => setTimeout(r, 40)); 
        }
    }
</script>

</body>
</html>
