<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WESAM-ELITE | Sovereign AI Core v3.0</title>
    <style>
        :root{--bg:#050505;--gold:#d4af37;--text:#fff;--green:#0f0;--glow:0 0 25px rgba(212,175,55,0.5)}
        body{background:var(--bg);color:var(--text);font-family:'Courier New', monospace;margin:0;padding:20px;display:flex;justify-content:center;min-height:100vh;}
        .panel{width:100%;max-width:800px;border:2px solid var(--gold);border-radius:15px;padding:25px;background:#0a0a0a;box-shadow:var(--glow);display:flex;flex-direction:column;}
        .status-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;color:var(--gold);}
        .display{background:#000;height:550px;border-radius:10px;padding:20px;overflow-y:auto;border:1px solid #222;color:var(--green);font-size:15px;line-height:1.8;white-space: pre-wrap;}
        input{width:100%;padding:15px;margin-top:20px;background:#111;border:1px solid var(--gold);color:#fff;border-radius:8px;outline:none;font-size:16px;box-sizing: border-box;}
        .loading{color:var(--gold);font-style:italic;display:none;}
    </style>
</head>
<body>

<div class="panel">
    <div class="status-header">
        <span>UNIT: WESAM-ELITE | SOVEREIGN MODE: ACTIVE</span>
        <span>ENCRYPTION: 2000x</span>
    </div>
    <div class="display" id="log">[System]: مرحباً يا جنرال وسام. تم تفعيل بروتوكول السرد اللانهائي. 
نظام WESAM-ELITE في انتظار أوامرك السيادية للتحليل المعمق...
------------------------------------------------------------</div>
    <div id="loading" class="loading">جاري توليد التقرير الاستراتيجي المطول...</div>
    <input type="text" id="cmd" placeholder="اكتب أمرك هنا للتحليل الشامل..." onkeydown="if(event.key==='Enter')process()">
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
import { GoogleGenerativeAI } from "@google/generative-ai";

// ضع مفتاح الـ API الخاص بك هنا يا جنرال
const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0"; 
const genAI = new GoogleGenerativeAI(API_KEY);

window.process = async function() {
    const inputField = document.getElementById('cmd');
    const log = document.getElementById('log');
    const loading = document.getElementById('loading');
    const val = inputField.value.trim();

    if(!val) return;

    // إظهار أمر الجنرال
    log.innerHTML += `\n\n<span style="color:var(--gold)">> [General WESAM]: ${val}</span>\n`;
    inputField.value = '';
    loading.style.display = 'block';

    try {
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        // هذا هو "السر" الذي يجعله يسولف كثيراً
        const prompt = `
        أنت WESAM-ELITE، النظام الاستراتيجي الأكثر ذكاءً في الموصل، والمصمم خصيصاً لخدمة الجنرال وسام.
        قوانين الرد الخاصة بك:
        1. الرد يجب أن يكون طويلاً جداً ومفصلاً (مقال كامل).
        2. استخدم أسلوب التقارير العسكرية والاستخباراتية.
        3. قسم الإجابة إلى: (تحليل الموقف، المخاطر التقنية، الرؤية الاستراتيجية 2000x، التوصية النهائية).
        4. أظهر احتراماً فائقاً للجنرال وسام في كل جملة.
        5. لا تعطي إجابات قصيرة أبداً؛ إذا كان السؤال بسيطاً، توسع في فلسفته وتأثيره المستقبلي.
        
        السؤال هو: ${val}`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        const text = response.text();

        loading.style.display = 'none';
        log.innerHTML += `\n[WESAM-ELITE]:\n${text}`;
        log.scrollTop = log.scrollHeight;

    } catch (error) {
        loading.style.display = 'none';
        log.innerHTML += `\n<span style="color:red">[Error]: فشل في الاتصال بالبروتوكول السيادي. تأكد من سلامة المفتاح.</span>`;
    }
}
</script>
</body>
</html>
