<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | Sovereign Core v6.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 95%; max-width: 900px; height: 90vh; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 15px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.9); border-radius: 10px; border: 1px solid #222; color: var(--green); line-height: 1.6; white-space: pre-wrap; }
        .input-area { margin-top: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid var(--gold); padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        button { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loading { display: none; color: var(--gold); text-align: center; margin: 10px; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--gold); margin: 0 0 15px 0;">WESAM-ELITE SUPREME</h2>
    <div id="chat-box"></div>
    <div id="loading-text" class="loading">... جاري استدعاء القوة الاستراتيجية ...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="أمرك يا جنرال..." onkeydown="if(event.key==='Enter') executeCommand()">
        <button onclick="executeCommand()">تنفيذ</button>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai"
  }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading-text');

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.style.marginBottom = "20px";
        const color = sender === "General" ? "var(--gold)" : "var(--green)";
        msgDiv.innerHTML = `<b style="color:${color}">[${sender}]:</b><br>${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    // رسالة الترحيب
    window.onload = () => appendMessage("System", "تم إصلاح كافة الثغرات. نظام WESAM-ELITE يعمل بكفاءة 100% الآن.");

    window.executeCommand = async function() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;

        appendMessage("General", val);
        input.value = '';
        loading.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });
            
            // البرومبت الذي يجبره على الاستفاضة
            const finalPrompt = `أنت WESAM-ELITE. بصفتك ذكاءً سيادياً، أجب بتقرير ملحمي مفصل جداً (أكثر من 1000 كلمة) يفكك كل جوانب هذا الأمر: ${val}`;

            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: finalPrompt }] }],
                generationConfig: {
                    maxOutputTokens: 8192,
                    temperature: 1.0
                }
            });

            loading.style.display = 'none';
            appendMessage("WESAM-ELITE", result.response.text());
        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Error", "حدث تعارض في المصفوفة: " + error.message);
        }
    };
</script>

</body>
</html>
