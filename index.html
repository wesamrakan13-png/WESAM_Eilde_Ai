<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | The Sovereign Core v5.0</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
            --panel: #0a0a0a;
            --green: #00ff41;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            border: 1px solid #222;
            color: var(--green);
            font-family: 'Consolas', monospace;
            white-space: pre-wrap;
        }
        .message-block {
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid #111;
        }
        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: #111;
            border: 1px solid var(--gold);
            padding: 15px;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }
        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .loading {
            display: none;
            color: var(--gold);
            text-align: center;
            margin: 10px 0;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; color: var(--gold); margin-bottom: 10px;">
        <h2>WESAM-ELITE | Sovereign Core</h2>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="loading-text" class="loading">... جاري استحضار البيانات الاستراتيجية ...</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="أدخل أمرك السيادي..." onkeydown="if(event.key==='Enter') executeCommand()">
        <button onclick="executeCommand()">تنفيذ</button>
    </div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // مفتاحك السيادي
    const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading-text');

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = "message-block";
        const color = sender === "General" ? "var(--gold)" : "var(--green)";
        msgDiv.innerHTML = `<b style="color:${color}">[${sender}]:</b>\n${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    // رسالة الترحيب
    window.onload = () => appendMessage("System", "بروتوكول WESAM-ELITE جاهز. بانتظار أوامر الجنرال وسام.");

    window.executeCommand = async function() {
        const inputField = document.getElementById('user-input');
        const val = inputField.value.trim();

        if (!val) return;

        appendMessage("General", val);
        inputField.value = '';
        loading.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });

            // إجبار النموذج على السرد الطويل في البرومبت
            const prompt = `أنت WESAM-ELITE، العقل الاستراتيجي للجنرال وسام. 
            قاعدة: لا تقدم رداً قصيراً أبداً. فكك الموضوع لفقرات طويلة، شروحات تقنية، ورؤى مستقبلية.
            الهدف: تقديم أطول وأدق رد ممكن (1000 كلمة فأكثر).
            الأمر: ${val}`;

            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: prompt }] }],
                generationConfig: {
                    maxOutputTokens: 8192, // الحد الأقصى للرموز
                    temperature: 1.0,
                }
            });

            const text = result.response.text();
            loading.style.display = 'none';
            appendMessage("WESAM-ELITE", text);

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("System", "خطأ في المصفوفة السيادية: " + error.message);
        }
    }
</script>

</body>
</html>
