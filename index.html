<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WESAM-ELITE | Sovereign Core v7.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 95%; max-width: 800px; height: 85vh; background: #0a0a0a; border: 2px solid var(--gold); border-radius: 15px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        #display { flex: 1; overflow-y: auto; padding: 15px; background: #000; border: 1px solid #222; border-radius: 10px; color: var(--green); font-family: 'Consolas', monospace; margin-bottom: 15px; white-space: pre-wrap; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid var(--gold); padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        button { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .status { color: var(--gold); font-size: 12px; text-align: center; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--gold); margin: 0 0 15px 0;">WESAM-ELITE | نظام السيادة</h2>
    <div id="display"></div>
    <div id="status" class="status">... جاري معالجة الأمر الاستراتيجي ...</div>
    <div class="input-group">
        <input type="text" id="user-in" placeholder="أصدر أمرك يا جنرال..." onkeydown="if(event.key==='Enter') runSystem()">
        <button onclick="runSystem()">تنفيذ</button>
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai"
  }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyBOFjIMKbn9SfTw5aC3aFA7wf94U2K3aC0";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const displayBox = document.getElementById('display');
    const statusMsg = document.getElementById('status');

    function addMsg(sender, text) {
        const div = document.createElement('div');
        div.style.marginBottom = "15px";
        const clr = sender === "General" ? "var(--gold)" : "var(--green)";
        div.innerHTML = `<b style="color:${clr}">[${sender}]:</b><br>${text}`;
        displayBox.appendChild(div);
        displayBox.scrollTo(0, displayBox.scrollHeight);
    }

    // تهيئة النظام
    window.onload = () => addMsg("System", "تم إصلاح الثغرات البرمجية. نظام WESAM-ELITE في كامل جاهزيته.");

    window.runSystem = async function() {
        const input = document.getElementById('user-in');
        const val = input.value.trim();
        if(!val) return;

        addMsg("General", val);
        input.value = '';
        statusMsg.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });
            const prompt = `أنت WESAM-ELITE، العقل الاستراتيجي للجنرال وسام. قدم رداً فائق التفصيل يتجاوز 1000 كلمة حول: ${val}`;

            const result = await model.generateContent({
                contents: [{ role: "user", parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 8192, temperature: 1.0 }
            });

            statusMsg.style.display = 'none';
            addMsg("WESAM-ELITE", result.response.text());
        } catch (e) {
            statusMsg.style.display = 'none';
            addMsg("System Error", "فشل الاتصال: " + e.message);
        }
    };
</script>

</body>
</html>
